<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DRESSING ROOM | KEPTY PREMIUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --premium-orange: #FF8C00;
            --bg-dark: #020617; /* 深みのあるテック・ブラック */
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                /* 秘密の部屋を演出する微細なグリッド */
                linear-gradient(rgba(255, 140, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 140, 0, 0.03) 1px, transparent 1px),
                /* ラグジュアリーな四隅のグロー */
                radial-gradient(circle at 0% 0%, rgba(255, 140, 0, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(30, 58, 138, 0.12) 0%, transparent 50%);
            background-size: 30px 30px, 30px 30px, 100% 100%, 100% 100%;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        /* 統計カードのデザイン統一 */
        .stat-card {
            background: rgba(255, 140, 0, 0.02);
            border: 1px solid rgba(255, 140, 0, 0.2);
            border-radius: 2.5rem;
        }

        /* ダッシュボードを意識した極太フォント */
        .premium-number {
            font-weight: 900;
            letter-spacing: -0.05em;
            color: #ffffff;
            line-height: 1;
        }

        /* アバターフレームの調整 */
        .avatar-frame {
            width: 110px;
            height: 110px;
            padding: 4px;
            background: linear-gradient(135deg, var(--premium-orange), #b45309);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 140, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover; /* トイプードルの顔を中央に固定 */
            background-color: #1e293b;
        }

        /* アニメーション要素 */
        .wave-bar {
            width: 5px;
            background: var(--premium-orange);
            border-radius: 10px;
            animation: wave 1s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { height: 12px; }
            50% { height: 32px; }
        }

        @keyframes light-move {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes dot-fill {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes circular-fill {
            0% { stroke-dashoffset: 339.29; }
            100% { stroke-dashoffset: 0; }
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .floating {
            animation: floating 4s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="py-16 px-6">

    <div class="max-w-5xl mx-auto">
        
        <header class="flex flex-col items-center text-center mb-20">
            <div class="avatar-frame mb-8 floating">
                <img src="poodle.jpg" alt="CEO Avatar" class="avatar-img">
            </div>
            
            <h1 class="text-4xl sm:text-5xl md:text-6xl font-black tracking-tight mb-8">
                THE <span style="color: var(--premium-orange);">DRESSING</span> ROOM
            </h1>

            <div class="flex items-center space-x-3 bg-white/5 px-6 py-2 rounded-full border border-white/10">
                <span class="w-2 h-2 rounded-full bg-[#FF8C00] animate-pulse"></span>
                <span class="text-[11px] font-bold tracking-widest uppercase text-gray-400">CEO AVATAR IS ACTIVE: <span class="text-white">03H 45M TODAY</span></span>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-6 mb-20">
            <div class="stat-card p-10 text-center glass-card">
                <p class="text-[10px] text-orange-500 font-black uppercase tracking-[0.2em] mb-4">Total Output</p>
                <div class="flex items-baseline justify-center">
                    <span class="text-6xl premium-number">320</span>
                    <span class="text-lg font-bold text-orange-500 ml-2 uppercase">Hrs</span>
                </div>
            </div>
            <div class="stat-card p-10 text-center glass-card">
                <p class="text-[10px] text-orange-500 font-black uppercase tracking-[0.2em] mb-4">Continuity</p>
                <div class="flex items-baseline justify-center">
                    <span class="text-6xl premium-number">445</span>
                    <span class="text-lg font-bold text-orange-500 ml-2 uppercase">Days</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="glass-card p-8 rounded-[2.5rem] flex justify-between items-center group">
                <div class="flex-1">
                    <div class="flex items-center space-x-2 mb-4">
                        <span class="w-1.5 h-1.5 bg-[#FF8C00] rounded-full"></span>
                        <span class="text-[10px] font-black uppercase tracking-widest text-orange-500">Shadowing</span>
                    </div>
                    <h3 class="text-2xl font-bold tracking-tight mb-8">Advanced Logic Flow</h3>
                    <div class="flex items-end space-x-1.5 h-10">
                        <div class="wave-bar" style="animation-delay: 0.1s"></div>
                        <div class="wave-bar" style="animation-delay: 0.3s"></div>
                        <div class="wave-bar" style="animation-delay: 0.2s"></div>
                        <div class="wave-bar" style="animation-delay: 0.5s"></div>
                        <div class="wave-bar" style="animation-delay: 0.4s"></div>
                    </div>
                </div>
                <div class="text-center flex flex-col items-center ml-4">
                    <button class="w-16 h-16 bg-[#FF8C00] rounded-full flex items-center justify-center shadow-lg shadow-orange-500/20 mb-3 group-hover:scale-110 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-black" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <div class="mono text-xs font-bold text-orange-500 tracking-tighter"><span class="countdown-seconds">30</span>S</div>
                </div>
            </div>

            <div class="glass-card p-8 rounded-[2.5rem] flex justify-between items-center group">
                <div class="flex-1">
                    <div class="flex items-center space-x-2 mb-4">
                        <span class="w-1.5 h-1.5 bg-[#FF8C00] rounded-full"></span>
                        <span class="text-[10px] font-black uppercase tracking-widest text-orange-500">Sentence Building</span>
                    </div>
                    <h3 class="text-2xl font-bold tracking-tight mb-8">Rapid Response Drill</h3>
                    <div class="w-3/4 h-[2px] bg-white/5 relative overflow-hidden">
                        <div class="absolute left-0 top-0 h-full bg-[#FF8C00] animate-[light-move_30s_linear_infinite]"></div>
                    </div>
                </div>
                <div class="text-center flex flex-col items-center ml-4">
                    <button class="w-16 h-16 bg-white/5 border border-white/10 rounded-full flex items-center justify-center mb-3 group-hover:bg-orange-500 group-hover:text-black transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <div class="mono text-xs font-bold text-orange-500 tracking-tighter"><span class="countdown-seconds">30</span>S</div>
                </div>
            </div>

            <div class="glass-card p-8 rounded-[2.5rem] flex justify-between items-center group">
                <div class="flex-1">
                    <div class="flex items-center space-x-2 mb-4">
                        <span class="w-1.5 h-1.5 bg-[#FF8C00] rounded-full"></span>
                        <span class="text-[10px] font-black uppercase tracking-widest text-orange-500">Topic Talk</span>
                    </div>
                    <h3 class="text-2xl font-bold tracking-tight mb-8">Investment Dialogue</h3>
                    <div class="space-y-2">
                        <div class="flex space-x-1.5 relative h-2">
                            <div class="absolute left-0 top-0 h-full flex space-x-1.5 overflow-hidden animate-[dot-fill_30s_linear_infinite]">
                                <div class="w-2 h-2 rounded-full bg-orange-500 flex-shrink-0"></div><div class="w-2 h-2 rounded-full bg-orange-500 flex-shrink-0"></div><div class="w-2 h-2 rounded-full bg-orange-500 flex-shrink-0"></div><div class="w-2 h-2 rounded-full bg-orange-500 flex-shrink-0"></div><div class="w-2 h-2 rounded-full bg-orange-500 flex-shrink-0"></div>
                            </div>
                            <div class="w-2 h-2 rounded-full bg-white/10"></div><div class="w-2 h-2 rounded-full bg-white/10"></div><div class="w-2 h-2 rounded-full bg-white/10"></div><div class="w-2 h-2 rounded-full bg-white/10"></div><div class="w-2 h-2 rounded-full bg-white/10"></div>
                        </div>
                        <div class="flex space-x-1.5 relative h-2">
                            <div class="absolute left-0 top-0 h-full flex space-x-1.5 overflow-hidden animate-[dot-fill_30s_linear_infinite]">
                                <div class="w-2 h-2 rounded-full bg-orange-500 flex-shrink-0"></div><div class="w-2 h-2 rounded-full bg-orange-500 flex-shrink-0"></div><div class="w-2 h-2 rounded-full bg-orange-500 flex-shrink-0"></div><div class="w-2 h-2 rounded-full bg-orange-500 flex-shrink-0"></div><div class="w-2 h-2 rounded-full bg-orange-500 flex-shrink-0"></div>
                            </div>
                            <div class="w-2 h-2 rounded-full bg-white/10"></div><div class="w-2 h-2 rounded-full bg-white/10"></div><div class="w-2 h-2 rounded-full bg-white/10"></div><div class="w-2 h-2 rounded-full bg-white/10"></div><div class="w-2 h-2 rounded-full bg-white/10"></div>
                        </div>
                    </div>
                </div>
                <div class="text-center flex flex-col items-center ml-4">
                    <button class="w-16 h-16 bg-white/5 border border-white/10 rounded-full flex items-center justify-center mb-3 group-hover:bg-orange-500 group-hover:text-black transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <div class="mono text-xs font-bold text-orange-500 tracking-tighter"><span class="countdown-seconds">30</span>S</div>
                </div>
            </div>

            <div class="glass-card p-8 rounded-[2.5rem] flex justify-between items-center group">
                <div class="flex-1">
                    <div class="flex items-center space-x-2 mb-4">
                        <span class="w-1.5 h-1.5 bg-[#FF8C00] rounded-full"></span>
                        <span class="text-[10px] font-black uppercase tracking-widest text-orange-500">Pronunciation</span>
                    </div>
                    <h3 class="text-2xl font-bold tracking-tight mb-8">Phonetic Precision</h3>
                    <div class="relative w-12 h-12">
                        <svg class="w-full h-full transform -rotate-90" viewBox="0 0 120 120">
                            <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="12"/>
                            <circle cx="60" cy="60" r="54" fill="none" stroke="#FF8C00" stroke-width="12" stroke-linecap="round" stroke-dasharray="339.29" stroke-dashoffset="339.29" class="animate-[circular-fill_30s_linear_infinite]"/>
                        </svg>
                    </div>
                </div>
                <div class="text-center flex flex-col items-center ml-4">
                    <button class="w-16 h-16 bg-white/5 border border-white/10 rounded-full flex items-center justify-center mb-3 group-hover:bg-orange-500 group-hover:text-black transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <div class="mono text-xs font-bold text-orange-500 tracking-tighter"><span class="countdown-seconds">30</span>S</div>
                </div>
            </div>

        </div>

        <footer class="text-center py-20 opacity-30">
            <p class="text-[10px] font-bold tracking-[0.5em] uppercase">Kepty English Premium | 2026</p>
        </footer>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const counters = document.querySelectorAll('.countdown-seconds');
            let timeLeft = 30;
            setInterval(() => {
                timeLeft = timeLeft <= 0 ? 30 : timeLeft - 1;
                counters.forEach(c => c.textContent = timeLeft);
            }, 1000);
        });
    </script>
</body>
</html>
